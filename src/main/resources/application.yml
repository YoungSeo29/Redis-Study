spring:
  profiles:
    default: local
  datasource:
    url: jdbc:mariadb://localhost:3306/mydb
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
logging:
  level:
    org.springframework.cache: trace

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://redis-db.c7e60c8k2azt.ap-northeast-2.rds.amazonaws.com:3306/redis-db
    username: ${PROD_DB_USERNAME}
    password: ${PROD_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver